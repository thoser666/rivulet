name: CI

on:
  push:
    branches: [ "**" ]  # Alle Branches
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Update apt cache
        run: sudo apt-get update
      
      - name: Install system dependencies
        run: |
          sudo apt-get install -y \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libdbus-1-dev \
            pkg-config
      
      - name: Verify libxcb installation
        run: |
          dpkg -l | grep libxcb || true
          pkg-config --exists xcb && echo "✅ xcb found" || echo "❌ xcb NOT found"
          pkg-config --cflags xcb || true
          pkg-config --libs xcb || true
      
      - name: Cargo check
        run: cargo check --workspace --all-targets --verbose

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libdbus-1-dev \
            pkg-config
      
      - name: Build
        run: cargo build --release --verbose
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: rivulet-linux-x86_64
          path: target/release/rivulet

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Build
        run: cargo build --release --verbose
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: rivulet-windows-x86_64
          path: target/release/rivulet.exe

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Build
        run: cargo build --release --verbose
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: rivulet-macos-x86_64
          path: target/release/rivulet

  test:
    name: Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libdbus-1-dev \
            pkg-config
      
