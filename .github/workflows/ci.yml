name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  ################################################################
  # LINTS & FORMATTING (läuft nur auf Linux, ist aber plattformunabhängig)
  ################################################################
  lints:
    name: Lints (Fmt & Clippy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # --- HIER IST DIE ERGÄNZUNG ---
      - name: Install GStreamer dependencies for clippy
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            gstreamer1.0-tools \
            libglib2.0-dev \
            libpipewire-0.3-dev \
            libspa-0.2-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
  
  ################################################################
  # BUILD & TEST MATRIX (läuft auf allen 3 Plattformen)
  ################################################################
  build_and_test:
    name: Build & Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # --- Linux Abhängigkeiten installieren ---
      - name: Install Linux dependencies (if applicable)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libdbus-1-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            gstreamer1.0-tools \
            libglib2.0-dev

      # --- Windows Abhängigkeiten installieren ---
            - name: Install Windows dependencies (if applicable)
        if: runner.os == 'Windows'
        # Wir verwenden PowerShell als Shell für diesen Schritt
        shell: pwsh
        run: |
          # 1. Installiere MSYS2 und pkg-config
          choco install msys2 --params "/NoUpdate /InstallDir:C:/msys64"
          C:/msys64/usr/bin/bash -lc "pacman -S --noconfirm mingw-w64-x86_64-pkg-config"
          
          # 2. Füge MSYS2 zum GitHub Actions PATH hinzu (für diesen und alle folgenden Schritte)
          echo "C:/msys64/mingw64/bin" >> $env:GITHUB_PATH
          
          # 3. Installiere GStreamer (MSVC, 64-bit, Runtime und Dev)
          # Wir verwenden eine bekannte, stabile Version, um 404-Fehler zu vermeiden
          choco install gstreamer --version=1.24.11
          choco install gstreamer-devel --version=1.24.11
          
          # 4. Setze die PKG_CONFIG_PATH-Umgebungsvariable für die folgenden Schritte
          # Dies ist der entscheidende, robuste Weg. Wir verwenden die vom GStreamer-Installer
          # selbst gesetzte Variable, um den Pfad dynamisch zu erstellen.
          $GSTREAMER_ROOT = $env:GSTREAMER_1_0_ROOT_MSVC_X86_64
          $PKG_PATH = Join-Path $GSTREAMER_ROOT "lib\pkgconfig"
          echo "Setting PKG_CONFIG_PATH to $PKG_PATH"
          echo "PKG_CONFIG_PATH=$PKG_PATH" >> $env:GITHUB_ENV
          
      # --- macOS Abhängigkeiten installieren ---
      - name: Install macOS dependencies (if applicable)
        if: runner.os == 'macOS'
        run: |
          brew install gstreamer gst-plugins-base gst-plugins-good gst-plugins-bad gst-plugins-ugly gst-libav

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --workspace --verbose

      - name: Test
        run: cargo test --workspace --verbose

  ################################################################
  # RELEASE BUILDS (optional, für später)
  ################################################################
  build_release:
    name: Build Release Binaries
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build_and_test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: rivulet-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: rivulet-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: rivulet-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: rivulet-macos-aarch64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # --- Release-Abhängigkeiten für alle Plattformen installieren ---
      - name: Install Linux release dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libxcb1-dev libgstreamer1.0-dev libglib2.0-dev

      - name: Install Windows release dependencies
        if: runner.os == 'Windows'
        run: |
          choco install msys2 --params "/NoUpdate /InstallDir:C:/msys64"
          C:/msys64/usr/bin/bash -lc "pacman -S --noconfirm mingw-w64-x86_64-pkg-config"
          echo "C:/msys64/mingw64/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          choco install gstreamer --version=1.24.11
          choco install gstreamer-devel --version=1.24.11
          echo "PKG_CONFIG_PATH=C:\gstreamer\1.0\msvc_x86_64\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: Install macOS release dependencies
        if: runner.os == 'macOS'
        run: brew install gstreamer

      - name: Build release binary
        run: cargo build --release --package rivulet-gui --target ${{ matrix.target }}

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/rivulet-gui

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/rivulet-gui*
