name: CI

on:
  push:
    branches: [ "12-localrecording-v2" ] # NUR auf diesem Branch laufen lassen
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_on_linux:
    name: Build and Test on Linux
    runs-on: ubuntu-latest
    # KEIN CACHE - wir wollen einen sauberen Build erzwingen
    
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 3. Install Linux System Dependencies
        run: |
          echo ">>> Updating package lists..."
          sudo apt-get update -y
          echo ">>> Installing required libraries..."
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libdbus-1-dev
          echo ">>> Finished installation."

      - name: 4. Verify Installation and Find Paths (DEBUG)
        run: |
          echo "--- Verifying libxcb installation ---"
          dpkg -L libxcb1-dev
          echo "--- Searching for libxcb.so ---"
          find /usr -name "libxcb.so"
          echo "--- Checking pkg-config ---"
          pkg-config --cflags xcb
          pkg-config --libs xcb
          
      - name: 5. Build the project with explicit library paths
        # Wir sagen dem Linker explizit, wo er suchen soll
        env:
          RUSTFLAGS: "-L native=/usr/lib/x86_64-linux-gnu"
        run: |
          cargo build --workspace --verbose

      - name: 6. Run tests (if build succeeds)
        env:
          RUSTFLAGS: "-L native=/usr/lib/x86_64-linux-gnu"
        run: |
          cargo test --workspace --verbose
