name: CI

on: [push, pull_request]

jobs:
  build_on_linux:
    name: Build and Test on Linux
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 3. Install Linux System Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libdbus-1-dev

      - name: 4. Build and Test Project
        # DIES IST DIE ENTSCHEIDENDE ÄNDERUNG:
        # Wir setzen die Umgebungsvariablen, die der Linker und pkg-config verwenden.
        env:
          LIBRARY_PATH: /usr/lib/x86_64-linux-gnu
          LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu
          PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig
        run: |
          echo "Building with explicit library paths..."
          cargo build --workspace --verbose
          echo "Testing with explicit library paths..."
          cargo test --workspace --verbose
