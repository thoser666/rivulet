name: Build and Test

on: [push, pull_request]

jobs:
  build_on_linux:
    name: Build on Linux
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout repository
        uses: actions/checkout@v4

      - name: 2. Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: 3. Install Linux System Dependencies
        run: |
          echo "Installing system libraries for GUI..."
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libdbus-1-dev \
            pkg-config

      - name: 4. Verify Installation (DEBUG STEP)
        run: |
          echo "--- Checking for libxcb ---"
          dpkg -l | grep libxcb1-dev
          pkg-config --exists xcb && echo "✅ pkg-config found xcb" || echo "❌ pkg-config did NOT find xcb"
          echo "---------------------------"

      - name: 5. Build the project
        run: cargo build --workspace --verbose

      - name: 6. Run tests
        run: cargo test --workspace --verbose
