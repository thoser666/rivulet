# This file provides target-specific build configurations for Cargo.

# Configuration for Linux builds
[target.x86_64-unknown-linux-gnu]
# This tells the linker (rust-lld) where to find system libraries like libxcb.
# It directly solves the "unable to find library -lxcb" error in CI environments.
rustflags = ["-L", "/usr/lib/x86_64-linux-gnu"]

# Du kannst hier später auch Konfigurationen für andere Targets hinzufügen, z.B.:
# [target.aarch64-unknown-linux-gnu]
# rustflags = ["-L", "/usr/lib/aarch64-linux-gnu"]