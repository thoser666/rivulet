# ================================================================
# Zielspezifische Konfiguration für Windows (x86_64-pc-windows-msvc)
# ================================================================
# Diese Einstellungen werden nur auf Windows-Systemen mit dem MSVC-Compiler angewendet.

[target.x86_64-pc-windows-msvc]

# Hier definieren wir die Umgebungsvariablen für den Windows-Build-Prozess.
[target.x86_64-pc-windows-msvc.env]

# Hint for `pkg-config` if you have FFmpeg development files installed locally (optional).
# If you use vcpkg (recommended on MSVC), you usually don't need this.
#PKG_CONFIG_PATH = "D:/dev/tools/ffmpeg/lib/pkgconfig"

# Prefer dynamic linking when probing libraries via vcpkg-rs on MSVC.
VCPKGRS_DYNAMIC = "1"

# Tell bindgen where to find `libclang.dll`.
LIBCLANG_PATH = "C:/Program Files/LLVM/bin"


# ================================================================
# Zielspezifische Konfiguration für Linux (x86_64-unknown-linux-gnu)
# ================================================================
# Diese Einstellungen werden nur auf Linux-Systemen (wie in GitHub Actions) angewendet.
# Sie werden auf Ihrem Windows-System vollständig ignoriert.

[target.x86_64-unknown-linux-gnu]

# Sagt dem Linker (rust-lld), wo er nach Systembibliotheken wie libxcb suchen soll.
# Dies löst Linker-Fehler in CI-Umgebungen.
rustflags = ["-L", "/usr/lib/x86_64-linux-gnu"]