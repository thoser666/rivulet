[package]
name = "rivulet-streaming"
version = "0.1.0"
edition = "2021"
description = "Video encoding and streaming for Rivulet"

[dependencies]
rivulet-core = { path = "../rivulet-core" }
anyhow = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true }
crossbeam-channel = "0.5"

# FFmpeg bindings mit static build
[target.'cfg(windows)'.dependencies]
ffmpeg-next = { version = "7.1", features = ["static"] }

[target.'cfg(not(windows))'.dependencies]
ffmpeg-next = "7.1"

[build-dependencies]
pkg-config = "0.3"